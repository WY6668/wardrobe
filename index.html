<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="衣藏 · 上传你的衣物照片，自由组合搭配，管理你的数字衣橱。">
<meta name="theme-color" content="#E6EADD">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%232C2B22'/%3E%3Ctext x='50' y='66' font-size='50' text-anchor='middle' fill='%23C9A25C' font-family='Georgia,serif'%3E衣%3C/text%3E%3C/svg%3E">
<title>衣藏 · 数字衣橱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E6EADD;
    --surface:#F4F6EE;
    --surface-2:#DFE4D2;
    --surface-3:#D2D9C0;
    --ink:#2C2B22;
    --ink-muted:#6B6A56;
    --ink-faint:#8F8C79;
    --gold:#A9792E;
    --gold-soft:#C9A25C;
    --terracotta:#B85C43;
    --sage:#6F8F5B;
    --on-accent:#FBF8EF;
    --hairline:rgba(44,43,34,0.12);
    --hairline-strong:rgba(44,43,34,0.22);
    --shadow: 0 12px 28px rgba(60,55,35,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(169,121,46,0.12), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overflow-x:hidden;
  }
  .mono{font-family:'JetBrains Mono',monospace; letter-spacing:0.06em;}
  .serif{font-family:'Cormorant Garamond',serif;}
  #app{max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}

  /* ---------- Header ---------- */
  header.top{padding:28px 20px 14px; position:relative;}
  header.top .brand-row{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  header.top .brand{display:flex; align-items:baseline; gap:10px;}
  header.top .brand-mark{
    width:34px;height:34px;border-radius:50%;
    border:1px solid var(--hairline-strong);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif; font-weight:600; font-size:18px; color:var(--gold);
    flex:none;
  }
  header.top h1{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:30px; margin:0; letter-spacing:0.01em;}
  header.top .tagline{color:var(--ink-muted); font-size:12px; margin:4px 0 0 44px; letter-spacing:0.04em;}
  .lang-toggle{
    flex:none; display:flex; align-items:center; gap:0; border:1px solid var(--hairline-strong); border-radius:20px;
    padding:3px; background:var(--surface); margin-top:2px;
  }
  .lang-toggle button{
    border:none; background:transparent; color:var(--ink-faint); font-family:'JetBrains Mono',monospace;
    font-size:11px; font-weight:500; padding:6px 11px; border-radius:16px; cursor:pointer; transition:all .2s; letter-spacing:.03em;
  }
  .lang-toggle button.active{background:var(--gold); color:var(--on-accent); font-weight:700;}

  nav.tabs{display:flex; gap:2px; padding:6px 20px 0; margin-top:18px; border-bottom:1px solid var(--hairline);}
  nav.tabs button{
    flex:1; background:none; border:none; color:var(--ink-faint);
    font-family:'Manrope',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.03em;
    padding:12px 4px 14px; cursor:pointer; position:relative; transition:color .25s;
  }
  nav.tabs button .count{
    font-family:'JetBrains Mono',monospace; font-weight:400; font-size:10px; margin-left:5px; color:inherit; opacity:.7;
  }
  nav.tabs button.active{color:var(--ink);}
  nav.tabs button::after{
    content:''; position:absolute; left:14%; right:14%; bottom:-1px; height:2px;
    background:var(--gold); transform:scaleX(0); transition:transform .3s cubic-bezier(.4,0,.2,1);
  }
  nav.tabs button.active::after{transform:scaleX(1);}

  main{flex:1; padding:18px 20px 100px; animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- Chips ---------- */
  .chip-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:14px; scrollbar-width:none;}
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex:none; padding:7px 14px; border-radius:20px; border:1px solid var(--hairline-strong);
    background:var(--surface); color:var(--ink-muted); font-size:12.5px; font-weight:600;
    cursor:pointer; white-space:nowrap; transition:all .2s; letter-spacing:.02em;
  }
  .chip.active{background:var(--gold); border-color:var(--gold); color:var(--on-accent);}
  .chip .badge{font-family:'JetBrains Mono',monospace; margin-right:5px; opacity:.75;}

  /* ---------- Wardrobe grid & Tag Card ---------- */
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px;}
  .tag-card{
    background:var(--surface); border:1px dashed var(--hairline-strong); border-radius:14px;
    padding:10px 10px 12px; position:relative; cursor:pointer; transition:transform .2s, border-color .2s, box-shadow .2s;
  }
  .tag-card:hover{transform:translateY(-3px); border-color:var(--gold-soft); box-shadow:var(--shadow);}
  .tag-card .hole{
    position:absolute; top:-7px; left:50%; transform:translateX(-50%);
    width:14px;height:14px;border-radius:50%; background:var(--bg); border:1px dashed var(--hairline-strong);
  }
  .tag-card .thumb-wrap{
    width:100%; aspect-ratio:1/1; border-radius:9px; overflow:hidden; background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; margin-bottom:8px;
  }
  .tag-card img{width:100%; height:100%; object-fit:cover; display:block;}
  .tag-card .cat-badge{
    position:absolute; top:16px; left:16px; width:22px; height:22px; border-radius:50%;
    background:rgba(44,43,34,0.82); border:1px solid rgba(251,248,239,0.25);
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond',serif; font-weight:700; font-size:12px; color:var(--gold);
  }
  .tag-card .name{font-size:13px; font-weight:700; line-height:1.3; margin:0 0 2px;}
  .tag-card .meta{display:flex; align-items:center; justify-content:space-between; margin-top:4px;}
  .tag-card .cat-label{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint); letter-spacing:.05em; text-transform:uppercase;}
  .tag-card .swatch{width:11px;height:11px;border-radius:50%; border:1px solid var(--hairline-strong);}

  .add-tile{
    border:1px dashed var(--hairline-strong); border-radius:14px; min-height:168px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    color:var(--ink-faint); cursor:pointer; transition:all .2s; background:transparent;
  }
  .add-tile:hover{border-color:var(--gold-soft); color:var(--gold);}
  .add-tile .plus{font-size:26px; font-family:'Cormorant Garamond',serif; line-height:1;}
  .add-tile span{font-size:12px; font-weight:600;}

  /* ---------- Empty state ---------- */
  .empty{text-align:center; padding:60px 20px 30px; color:var(--ink-muted);}
  .empty .glyph{
    width:56px;height:56px;border-radius:50%; margin:0 auto 18px; border:1px solid var(--hairline-strong);
    display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--gold);
  }
  .empty h3{font-family:'Cormorant Garamond',serif; font-size:22px; margin:0 0 8px; color:var(--ink); font-weight:600;}
  .empty p{font-size:13px; line-height:1.6; margin:0 0 20px; color:var(--ink-muted);}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    border-radius:24px; padding:12px 22px; font-weight:700; font-size:13.5px; letter-spacing:.02em;
    cursor:pointer; border:none; transition:all .2s; font-family:'Manrope',sans-serif;
  }
  .btn-primary{background:var(--gold); color:var(--on-accent);}
  .btn-primary:hover{background:#D4B06E;}
  .btn-primary:disabled{background:var(--surface-3); color:var(--ink-faint); cursor:not-allowed;}
  .btn-ghost{background:transparent; border:1px solid var(--hairline-strong); color:var(--ink);}
  .btn-ghost:hover{border-color:var(--gold-soft); color:var(--gold);}
  .btn-danger{background:transparent; border:1px solid rgba(201,123,99,0.4); color:var(--terracotta);}
  .btn-block{width:100%;}

  .fab{
    position:fixed; right:calc(50% - 280px + 20px); bottom:24px; z-index:30;
    width:54px; height:54px; border-radius:50%; background:var(--gold); color:var(--on-accent);
    display:flex; align-items:center; justify-content:center; font-size:26px; font-family:'Cormorant Garamond',serif;
    border:none; cursor:pointer; box-shadow:0 10px 26px rgba(169,121,46,0.32); transition:transform .2s;
  }
  .fab:hover{transform:scale(1.06);}
  @media (max-width:560px){ .fab{right:20px;} }

  /* ---------- Builder / Board ---------- */
  .mode-switch{display:flex; background:var(--surface); border:1px solid var(--hairline); border-radius:22px; padding:3px; margin-bottom:18px;}
  .mode-switch button{
    flex:1; border:none; background:transparent; color:var(--ink-muted); padding:9px 0; border-radius:18px;
    font-size:12.5px; font-weight:700; cursor:pointer; transition:all .2s; font-family:'Manrope',sans-serif;
  }
  .mode-switch button.active{background:var(--surface-3); color:var(--gold);}

  .board{position:relative; padding:16px 0 6px;}
  .board .hook{
    width:26px; height:14px; margin:0 auto; border:2px solid var(--ink-faint); border-bottom:none;
    border-radius:14px 14px 0 0; opacity:.6;
  }
  .board .thread{
    position:absolute; top:34px; bottom:60px; left:50%; width:1px; background:var(--hairline-strong); z-index:0;
  }
  .slots{position:relative; z-index:1; display:flex; flex-direction:column; gap:12px;}
  .slot{
    display:flex; align-items:center; gap:14px; background:var(--surface); border:1px solid var(--hairline);
    border-radius:14px; padding:10px; cursor:pointer; transition:border-color .2s, background .2s;
  }
  .slot:hover{border-color:var(--gold-soft);}
  .slot.filled{background:var(--surface-2);}
  .slot .s-thumb{
    width:56px; height:56px; border-radius:10px; overflow:hidden; flex:none; background:var(--surface-3);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .slot .s-thumb img{width:100%; height:100%; object-fit:cover;}
  .slot .s-thumb .cat-badge-sm{font-family:'Cormorant Garamond',serif; color:var(--ink-faint); font-size:20px; font-weight:700;}
  .slot .s-body{flex:1; min-width:0;}
  .slot .s-label{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.06em; color:var(--ink-faint); text-transform:uppercase; margin-bottom:3px;}
  .slot .s-title{font-size:13.5px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .slot .s-title.placeholder{color:var(--ink-faint); font-weight:500;}
  .slot .s-remove{
    flex:none; width:26px; height:26px; border-radius:50%; border:1px solid var(--hairline-strong); background:transparent;
    color:var(--ink-faint); font-size:14px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .slot .s-remove:hover{color:var(--terracotta); border-color:var(--terracotta);}

  .save-outfit-btn{margin-top:22px;}

  /* ---------- Tray ---------- */
  .tray-overlay{
    position:fixed; inset:0; background:rgba(10,12,18,0.55); z-index:40; display:flex; align-items:flex-end;
    animation:fadeIn .2s ease both;
  }
  .tray{
    width:100%; max-width:560px; margin:0 auto; background:var(--surface); border-radius:20px 20px 0 0;
    border-top:1px solid var(--hairline-strong); padding:18px 20px 24px; max-height:72vh; overflow-y:auto;
    animation:slideUp .28s cubic-bezier(.2,.8,.3,1) both;
  }
  @keyframes slideUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
  .tray-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .tray-head h4{font-family:'Cormorant Garamond',serif; font-size:19px; margin:0; font-weight:700;}
  .tray-close{background:none; border:none; color:var(--ink-faint); font-size:22px; cursor:pointer; line-height:1;}
  .tray-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .tray-item{
    border-radius:12px; overflow:hidden; border:1px solid var(--hairline); cursor:pointer; position:relative;
    aspect-ratio:1/1; background:var(--surface-2); transition:border-color .2s;
  }
  .tray-item img{width:100%; height:100%; object-fit:cover;}
  .tray-item.selected{border-color:var(--gold); box-shadow:0 0 0 2px var(--gold) inset;}
  .tray-item .check{
    position:absolute; top:5px; right:5px; width:18px; height:18px; border-radius:50%; background:var(--gold);
    color:var(--on-accent); font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:700;
  }
  .tray-empty{text-align:center; color:var(--ink-faint); font-size:12.5px; padding:30px 0;}

  /* ---------- Modal (add item / detail) ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(10,12,18,0.65); z-index:50; display:flex; align-items:center; justify-content:center;
    padding:20px; animation:fadeIn .2s ease both;
  }
  .modal{
    width:100%; max-width:420px; background:var(--surface); border:1px solid var(--hairline-strong); border-radius:18px;
    padding:22px; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow);
  }
  .modal h3{font-family:'Cormorant Garamond',serif; font-size:22px; margin:0 0 16px; font-weight:700;}
  .upload-zone{
    width:100%; aspect-ratio:4/3; border-radius:12px; border:1.5px dashed var(--hairline-strong);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer;
    color:var(--ink-faint); background:var(--surface-2); overflow:hidden; position:relative; margin-bottom:16px;
  }
  .upload-zone img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0;}
  .upload-zone .uz-label{position:relative; z-index:1; font-size:12px; font-weight:600;}
  .field-label{font-size:11px; font-family:'JetBrains Mono',monospace; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); margin:16px 0 8px;}
  .field-label:first-of-type{margin-top:0;}
  input[type=text]{
    width:100%; background:var(--surface-2); border:1px solid var(--hairline); border-radius:10px; padding:11px 12px;
    color:var(--ink); font-family:'Manrope',sans-serif; font-size:13.5px; outline:none;
  }
  input[type=text]:focus{border-color:var(--gold-soft);}
  .cat-pick{display:flex; flex-wrap:wrap; gap:8px;}
  .cat-pick button{
    padding:8px 13px; border-radius:16px; border:1px solid var(--hairline-strong); background:var(--surface-2);
    color:var(--ink-muted); font-size:12px; font-weight:600; cursor:pointer; transition:all .2s;
  }
  .cat-pick button.active{background:var(--gold); border-color:var(--gold); color:var(--on-accent);}
  .swatch-pick{display:flex; flex-wrap:wrap; gap:9px;}
  .swatch-pick .sw{width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .15s;}
  .swatch-pick .sw.active{border-color:var(--ink); transform:scale(1.12);}
  .modal-actions{display:flex; gap:10px; margin-top:22px;}
  .modal-actions .btn{flex:1;}

  .detail-img{width:100%; border-radius:12px; margin-bottom:14px; aspect-ratio:1/1; object-fit:cover; background:var(--surface-2);}
  .detail-row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--hairline);}
  .detail-row:last-of-type{border-bottom:none;}
  .detail-row .k{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.05em;}
  .detail-row .v{font-size:13px; font-weight:600;}

  /* ---------- Mannequin (worn preview) ---------- */
  .mannequin-panel{
    background:var(--surface); border:1px solid var(--hairline); border-radius:20px;
    padding:20px 16px 14px; display:flex; flex-direction:column; align-items:center; margin-bottom:18px;
  }
  .mannequin-panel svg{width:172px; height:auto; display:block;}
  .mannequin-panel.detail{padding:24px 16px 16px; margin-bottom:16px;}
  .mannequin-panel.detail svg{width:200px;}
  .mannequin-caption{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin-top:10px;}

  /* ---------- Saved outfits ---------- */
  .outfit-card{
    background:var(--surface); border:1px solid var(--hairline); border-radius:16px; padding:14px; margin-bottom:14px;
    display:flex; gap:14px; cursor:pointer; transition:border-color .2s; align-items:center;
  }
  .outfit-card:hover{border-color:var(--gold-soft);}
  .outfit-mini{
    width:74px; flex:none; border-radius:12px; overflow:hidden; background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; padding:6px 0;
  }
  .outfit-mini svg{width:56px; height:auto; display:block;}
  .outfit-info{flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center;}
  .outfit-info .o-name{font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:700; margin:0 0 4px;}
  .outfit-info .o-date{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-faint);}
  .outfit-info .o-pieces{font-size:11.5px; color:var(--ink-muted); margin-top:6px;}
  .outfit-info .o-scenario{
    display:inline-block; margin-top:8px; padding:3px 10px; border-radius:10px;
    background:var(--surface-2); color:var(--gold); font-size:10.5px; font-weight:700; letter-spacing:.02em;
  }

  /* ---------- Toast ---------- */
  #toast{
    position:fixed; left:50%; bottom:28px; transform:translate(-50%, 20px); z-index:100;
    background:var(--surface-3); border:1px solid var(--hairline-strong); color:var(--ink); padding:11px 20px;
    border-radius:22px; font-size:12.5px; font-weight:600; opacity:0; transition:all .3s; pointer-events:none;
    box-shadow:var(--shadow);
  }
  #toast.show{opacity:1; transform:translate(-50%, 0);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--surface-3); border-radius:3px;}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="brand-row">
      <div class="brand">
        <div class="brand-mark">衣</div>
        <h1 id="app-title">衣藏</h1>
      </div>
      <div class="lang-toggle" id="lang-toggle">
        <button data-lang="zh">中</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
    <div class="tagline" id="app-tagline"></div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-view="wardrobe" class="active">衣橱 <span class="count mono" id="count-wardrobe"></span></button>
    <button data-view="builder">搭配</button>
    <button data-view="saved">我的搭配 <span class="count mono" id="count-saved"></span></button>
  </nav>

  <main id="view-root"></main>
</div>

<button class="fab" id="fab" title="添加单品">+</button>
<input type="file" id="file-input" accept="image/*" hidden>
<div id="modal-root"></div>
<div id="toast"></div>

<script>
(function(){
  "use strict";

  // ---------- i18n ----------
  const T = {
    zh: {
      tagline: '你的数字衣橱',
      tab_wardrobe: '衣橱', tab_builder: '搭配', tab_saved: '我的搭配',
      chip_all: '全部',
      wardrobe_empty_title: '衣橱还是空的',
      wardrobe_empty_desc: '上传第一件单品的照片，<br>开始搭建你的数字衣橱吧。',
      add_item_btn: '＋ 添加单品',
      filtered_empty_title: '这个分类还没有单品',
      filtered_empty_desc: '切换分类看看，或添加一件新单品。',
      modal_add_title: '添加单品',
      upload_label: '📷 点击上传衣物照片',
      field_category: '分类',
      field_name: '名称（选填）',
      name_placeholder: '例如：白色棉质T恤',
      field_color: '主色（选填）',
      cancel: '取消',
      save_to_wardrobe: '保存到衣橱',
      toast_added: '已添加到衣橱',
      toast_deleted_item: '已删除单品',
      toast_img_fail: '图片处理失败，请重试',
      toast_save_fail: '保存失败，请重试',
      detail_color: '主色', detail_added: '添加时间', detail_delete: '删除单品', close: '关闭',
      builder_empty_title: '先添加一些单品吧',
      builder_empty_desc: '衣橱里有单品后，就可以在这里<br>自由组合出你的专属造型。',
      go_add_items: '＋ 去添加单品',
      mode_separate: '上下装', mode_dress: '连衣裙',

  // ---------- Mannequin (worn-outfit) SVG renderer ----------
  let mannequinIdSeq = 0;
  function mannequinSVG(sel){
    const idp = 'mnq' + (mannequinIdSeq++);
    const outerItem  = findItem(sel.outer);
    const topItem    = sel.mode==='dress' ? null : findItem(sel.top);
    const dressItem  = sel.mode==='dress' ? findItem(sel.dress) : null;
    const bottomItem = sel.mode!=='dress' ? findItem(sel.bottom) : null;
    const shoesItem  = findItem(sel.shoes);
    const extraItems = (sel.extras||[]).map(findItem).filter(Boolean);
    const bagItem = extraItems.find(i=>i.category==='bag');
    const hatItem = extraItems.find(i=>i.category==='hat');
    const accItem = extraItems.find(i=>i.category==='accessory');

    const PH = 'var(--surface-2)';
    const STROKE = 'var(--hairline-strong)';

    let defs = '';
    const zone = (id, d, item, badgeChar) => {
      defs += `<clipPath id="${id}"><path d="${d}"/></clipPath>`;
      const placeholder = `<path d="${d}" fill="${PH}" stroke="${STROKE}" stroke-width="1.5"/>`;
      const filled = item ? `<image href="${item.image}" x="0" y="0" width="300" height="580" preserveAspectRatio="xMidYMid slice" clip-path="url(#${id})"/>` : '';
      const badge = (!item && badgeChar) ? badgeText(d, badgeChar) : '';
      return placeholder + filled + badge;
    };

    function badgeText(d, char){
      // crude centroid: average of path numeric coordinate pairs
      const nums = d.match(/-?\d+(\.\d+)?/g).map(Number);
      let sx=0, sy=0, n=0;
      for(let i=0;i<nums.length;i+=2){ sx+=nums[i]; sy+=nums[i+1]; n++; }
      const cx = sx/n, cy = sy/n;
      return `<text x="${cx}" y="${cy+6}" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="20" font-weight="700" fill="var(--ink-faint)">${char}</text>`;
    }

    // base croquis (head / neck / arms) - always drawn
    let base = `
      <ellipse cx="150" cy="548" rx="56" ry="8" fill="rgba(44,43,34,0.08)"/>
      <rect x="68" y="104" width="22" height="140" rx="11" fill="${PH}" stroke="${STROKE}" stroke-width="1.5"/>
      <rect x="210" y="104" width="22" height="140" rx="11" fill="${PH}" stroke="${STROKE}" stroke-width="1.5"/>
      <rect x="140" y="80" width="20" height="20" fill="${PH}"/>
      <circle cx="150" cy="55" r="30" fill="${PH}" stroke="${STROKE}" stroke-width="1.5"/>
    `;

    let mid = '';
    if(sel.mode==='dress'){
      mid += zone(`${idp}-dress`, 'M92,100 L208,100 L188,528 L112,528 Z', dressItem, catBadge(CAT_MAP.dress));
    }else{
      mid += zone(`${idp}-bottom`, 'M103,242 L197,242 L182,528 L118,528 Z', bottomItem, catBadge(CAT_MAP.bottom));
    }
    mid += zone(`${idp}-shoes`, 'M108,522 L192,522 L192,546 Q150,556 108,546 Z', shoesItem, catBadge(CAT_MAP.shoes));
    if(sel.mode!=='dress'){
      mid += zone(`${idp}-top`, 'M92,100 L208,100 L200,246 L100,246 Z', topItem, catBadge(CAT_MAP.top));
    }
    if(outerItem){
      mid += zone(`${idp}-outer`, 'M82,96 L218,96 L206,250 L94,250 Z', outerItem, null);
      const collarItem = sel.mode==='dress' ? dressItem : topItem;
      if(collarItem){
        mid += zone(`${idp}-collar`, 'M128,98 Q150,112 172,98 L172,116 Q150,126 128,116 Z', collarItem, null);
      }
    }
    if(bagItem){ mid += zone(`${idp}-bag`, 'M212,272 Q244,266 244,296 L244,320 Q244,332 212,332 Z', bagItem, null); }
    if(accItem){ mid += zone(`${idp}-acc`, 'M150,84 m-15,0 a15,15 0 1,0 30,0 a15,15 0 1,0 -30,0', accItem, null); }
    if(hatItem){ mid += zone(`${idp}-hat`, 'M150,20 m-28,0 a28,28 0 1,0 56,0 a28,28 0 1,0 -56,0', hatItem, null); }

    return `<svg viewBox="0 0 300 580" xmlns="http://www.w3.org/2000/svg"><defs>${defs}</defs>${base}${mid}</svg>`;
  }

  // ---------- Image compression ----------
  function compressImage(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = e=>{
        const img = new Image();
        img.onload = ()=>{
          const MAX = 520;
          let w = img.width, h = img.height;
          if(w > h && w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
          else if(h >= w && h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(0,0,w,h);
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.72));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

      <div class="mode-switch">
        <button data-mode="separate" class="${state.builder.mode==='separate'?'active':''}">${tr('mode_separate')}</button>
        <button data-mode="dress" class="${state.builder.mode==='dress'?'active':''}">${tr('mode_dress')}</button>
      </div>
      <div class="slots">
        ${cfg.map(slotHTML).join('')}
      </div>
      <button class="btn btn-primary btn-block save-outfit-btn" id="save-outfit-btn">${tr('save_outfit_btn')}</button>
    `;

    $$('.mode-switch button').forEach(b=>b.addEventListener('click', ()=>{
      if(state.builder.mode===b.dataset.mode) return;
      state.builder.mode = b.dataset.mode;
      state.builder.top=null; state.builder.bottom=null; state.builder.dress=null;
      renderBuilder();
    }));

    $$('.slot').forEach(el=>el.addEventListener('click', e=>{
      if(e.target.classList.contains('s-remove')) return;
      openTray(el.dataset.key, JSON.parse(el.dataset.cats));
    }));
    $$('.s-remove').forEach(el=>el.addEventListener('click', e=>{
      e.stopPropagation();
      const key = el.closest('.slot').dataset.key;
      if(key==='extras') state.builder.extras=[];
      else state.builder[key]=null;
      renderBuilder();
    }));

    $('#save-outfit-btn').addEventListener('click', saveOutfit);
  }

  function slotHTML(cfg){
    if(cfg.multi){
      const list = state.builder.extras.map(id=>state.items.find(i=>i.id===id)).filter(Boolean);
      const first = list[0];
      return `<div class="slot ${list.length?'filled':''}" data-key="${cfg.key}" data-cats='${JSON.stringify(cfg.cats)}'>
        <div class="s-thumb">${first ? `<img src="${first.image}">` : `<span class="cat-badge-sm">${catBadge(CAT_MAP[cfg.cats[0]])}</span>`}</div>
        <div class="s-body">
          <div class="s-label">${tr(cfg.labelKey)}</div>
          <div class="s-title ${list.length?'':'placeholder'}">${list.length ? list.map(i=>i.name||catLabel(CAT_MAP[i.category])).join('、') : tr('tap_choose_extra')}</div>
        </div>
        ${list.length ? `<button class="s-remove">×</button>` : ''}
      </div>`;
    }
    const item = state.builder[cfg.key] ? state.items.find(i=>i.id===state.builder[cfg.key]) : null;
    const catObj = CAT_MAP[cfg.cats[0]];
    return `<div class="slot ${item?'filled':''}" data-key="${cfg.key}" data-cats='${JSON.stringify(cfg.cats)}'>
      <div class="s-thumb">${item ? `<img src="${item.image}">` : `<span class="cat-badge-sm">${catBadge(catObj)}</span>`}</div>
      <div class="s-body">
        <div class="s-label">${tr(cfg.labelKey)}</div>
        <div class="s-title ${item?'':'placeholder'}">${item ? (item.name||catLabel(catObj)) : `${tr('tap_choose')}${catLabel(catObj)}`}</div>
      </div>
      ${item ? `<button class="s-remove">×</button>` : ''}
    </div>`;
  }

  // ---------- Tray ----------
  function openTray(slotKey, cats){
    state.activeSlot = slotKey;
    const isMulti = slotKey === 'extras';
    state.trayMultiSelection = isMulti ? [...state.builder.extras] : [];
    renderTray(cats, isMulti);
  }

  function renderTray(cats, isMulti){
    const pool = state.items.filter(i=>cats.includes(i.category));
    const label = cats.map(c=>catLabel(CAT_MAP[c])).join(' / ');
    const existing = $('#tray-overlay');
    if(existing) existing.remove();
    modalRoot.insertAdjacentHTML('beforeend', `
      <div class="tray-overlay" id="tray-overlay">
        <div class="tray">
          <div class="tray-head">
            <h4>${tr('tray_choose')}${label}</h4>
            <button class="tray-close" id="tray-close">×</button>
          </div>
          ${pool.length===0 ? `<div class="tray-empty">${tr('tray_empty')}</div>` :
          `<div class="tray-grid" id="tray-grid">
            ${pool.map(i=>`<div class="tray-item ${isMulti ? (state.trayMultiSelection.includes(i.id)?'selected':'') : ''}" data-id="${i.id}">
              <img src="${i.image}">
              ${isMulti && state.trayMultiSelection.includes(i.id) ? '<div class="check">✓</div>' : ''}
            </div>`).join('')}
          </div>`}
          ${isMulti && pool.length>0 ? `<button class="btn btn-primary btn-block" id="tray-done" style="margin-top:16px;">${tr('tray_done')}</button>` : ''}
        </div>
      </div>`);

    const overlay = $('#tray-overlay');
    overlay.addEventListener('click', e=>{ if(e.target.id==='tray-overlay') closeTray(); });
    $('#tray-close').addEventListener('click', closeTray);

    $$('.tray-item').forEach(el=>el.addEventListener('click', ()=>{
      const id = el.dataset.id;
      if(isMulti){
        const idx = state.trayMultiSelection.indexOf(id);
        if(idx>-1) state.trayMultiSelection.splice(idx,1); else state.trayMultiSelection.push(id);
        renderTray(cats, isMulti);
      }else{
        state.builder[state.activeSlot] = id;
        closeTray();
        renderBuilder();
      }
    }));

    const doneBtn = $('#tray-done');
    if(doneBtn) doneBtn.addEventListener('click', ()=>{
      state.builder.extras = [...state.trayMultiSelection];
      closeTray();
      renderBuilder();
    });
  }

  function closeTray(){
    const overlay = $('#tray-overlay');
    if(overlay) overlay.remove();
    state.activeSlot = null;
  }

  // ---------- Save outfit ----------
  function saveOutfit(){
    const b = state.builder;
    const hasMain = b.mode==='dress' ? b.dress : (b.top || b.bottom);
    if(!hasMain && !b.outer && !b.shoes && b.extras.length===0){
      toast(tr('toast_pick_first'));
      return;
    }
    state.pendingScenario = null;
    state.pendingOutfitName = '';
    renderSaveOutfitModal();
  }

  function renderSaveOutfitModal(){
    const b = state.builder;
    modalRoot.innerHTML = `
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
          <h3>${tr('save_outfit_title')}</h3>
          <div class="field-label">${tr('name_outfit_label')}</div>
          <input type="text" id="outfit-name" placeholder="${tr('outfit_placeholder')}" value="${state.pendingOutfitName.replace(/"/g,'&quot;')}">
          <div class="field-label">${tr('field_scenario')}</div>
          <div class="cat-pick" id="scenario-pick">
            ${SCENARIOS.map(s=>`<button data-sc="${s.id}" class="${state.pendingScenario===s.id?'active':''}">${scenarioLabel(s)}</button>`).join('')}
          </div>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="cancel-save">${tr('cancel')}</button>
            <button class="btn btn-primary" id="confirm-save">${tr('save')}</button>
          </div>
        </div>
      </div>`;
    $('#modal-overlay').addEventListener('click', e=>{ if(e.target.id==='modal-overlay') modalRoot.innerHTML=''; });
    $('#outfit-name').addEventListener('input', e=>{ state.pendingOutfitName = e.target.value; });
    $$('#scenario-pick button').forEach(btn=>btn.addEventListener('click', ()=>{
      state.pendingScenario = state.pendingScenario===btn.dataset.sc ? null : btn.dataset.sc;
      renderSaveOutfitModal();
    }));
    $('#cancel-save').addEventListener('click', ()=>{ modalRoot.innerHTML=''; });
    $('#confirm-save').addEventListener('click', async ()=>{
      const name = state.pendingOutfitName.trim() || `${tr('save_outfit_title')} · ${new Date().toLocaleDateString(tr('locale'))}`;
      const pieceIds = [b.outer, b.mode==='dress'?b.dress:b.top, b.mode==='separate'?b.bottom:null, b.shoes, ...b.extras].filter(Boolean);
      const outfit = {
        id: uid(), name, mode: b.mode, scenario: state.pendingScenario,
        outer:b.outer, top:b.top, bottom:b.bottom, dress:b.dress, shoes:b.shoes, extras:[...b.extras],
        pieceIds, createdAt: Date.now(),
      };
      state.savedOutfits.unshift(outfit);
      modalRoot.innerHTML='';
      state.builder = { mode: b.mode, outer:null, top:null, bottom:null, dress:null, shoes:null, extras:[] };
      await persistOutfits();
      renderAll();
      toast(tr('toast_outfit_saved'));
      setView('saved');
    });
  }

  // ---------- Saved outfits view ----------
  function renderSaved(){
    if(state.savedOutfits.length===0){
      root.innerHTML = `<div class="empty">
        <div class="glyph">—</div>
        <h3>${tr('saved_empty_title')}</h3>
        <p>${tr('saved_empty_desc')}</p>
        <button class="btn btn-primary" id="go-builder">${tr('go_builder')}</button>
      </div>`;
      $('#go-builder').addEventListener('click', ()=>setView('builder'));
      return;
    }
    const filtered = state.savedFilter.size===0 ? state.savedOutfits : state.savedOutfits.filter(o=>o.scenario && state.savedFilter.has(o.scenario));
    let html = `<div class="chip-row" id="saved-chip-row">
      <button class="chip ${state.savedFilter.size===0?'active':''}" data-sc="all">${tr('chip_all')}</button>
      ${SCENARIOS.map(s=>`<button class="chip ${state.savedFilter.has(s.id)?'active':''}" data-sc="${s.id}">${scenarioLabel(s)}</button>`).join('')}
    </div>`;
    if(filtered.length===0){
      html += `<div class="empty"><div class="glyph">—</div><p>${tr('saved_filtered_empty')}</p></div>`;
    }else{
      html += filtered.map(outfitCardHTML).join('');
    }
    root.innerHTML = html;
    $$('#saved-chip-row .chip').forEach(el=>el.addEventListener('click', ()=>{
      const sc = el.dataset.sc;
      if(sc==='all'){ state.savedFilter.clear(); }
      else{ state.savedFilter.has(sc) ? state.savedFilter.delete(sc) : state.savedFilter.add(sc); }
      renderSaved();
    }));
    $$('.outfit-card').forEach(el=>el.addEventListener('click', ()=>openOutfitDetail(el.dataset.id)));
  }

  function findItem(id){ return id ? state.items.find(i=>i.id===id) : null; }

  function outfitCardHTML(outfit){
    const count = outfit.pieceIds.length;
    const sc = outfit.scenario ? SCENARIO_MAP[outfit.scenario] : null;
    return `<div class="outfit-card" data-id="${outfit.id}">
      <div class="outfit-mini">${mannequinSVG(outfit)}</div>
      <div class="outfit-info">
        <p class="o-name">${outfit.name}</p>
        <span class="o-date mono">${new Date(outfit.createdAt).toLocaleDateString(tr('locale'))}</span>
        <span class="o-pieces">${tr('pieces_prefix')}${count}${tr('pieces_suffix')}</span>
        ${sc ? `<span class="o-scenario">${scenarioLabel(sc)}</span>` : ''}
      </div>
    </div>`;
  }

  function openOutfitDetail(id){
    const outfit = state.savedOutfits.find(o=>o.id===id);
    if(!outfit) return;
    const pieces = outfit.pieceIds.map(findItem).filter(Boolean);
    const sc = outfit.scenario ? SCENARIO_MAP[outfit.scenario] : null;
    modalRoot.innerHTML = `
      <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
          <h3>${outfit.name}</h3>
          ${sc ? `<div class="detail-row"><span class="k mono">${tr('detail_scenario')}</span><span class="v">${scenarioLabel(sc)}</span></div>` : ''}
          <div class="mannequin-panel detail">${mannequinSVG(outfit)}</div>
          <div class="grid" style="margin-bottom:6px;">
            ${pieces.map(p=>`<div class="tag-card" style="cursor:default;">
              <div class="hole"></div>
              <div class="thumb-wrap"><img src="${p.image}"></div>
              <div class="cat-badge">${catBadge(CAT_MAP[p.category])}</div>
              <p class="name">${p.name||catLabel(CAT_MAP[p.category])}</p>
            </div>`).join('')}
          </div>
          <div class="modal-actions">
            <button class="btn btn-danger" id="del-outfit-btn">${tr('delete_outfit')}</button>
            <button class="btn btn-ghost" id="close-outfit-btn">${tr('close')}</button>
          </div>
        </div>
      </div>`;
    $('#modal-overlay').addEventListener('click', e=>{ if(e.target.id==='modal-overlay') modalRoot.innerHTML=''; });
    $('#close-outfit-btn').addEventListener('click', ()=> modalRoot.innerHTML='');
    $('#del-outfit-btn').addEventListener('click', async ()=>{
      state.savedOutfits = state.savedOutfits.filter(o=>o.id!==id);
      modalRoot.innerHTML='';
      await persistOutfits();
      renderAll();
      toast(tr('toast_deleted_outfit'));
    });
  }

  // ---------- Tabs / view switching / language ----------
  function setView(v){
    state.view = v;
    $$('#tabs button').forEach(b=>b.classList.toggle('active', b.dataset.view===v));
    renderAll();
  }
  $$('#tabs button').forEach(b=>b.addEventListener('click', ()=>setView(b.dataset.view)));
  $('#fab').addEventListener('click', openAddModal);
  $$('#lang-toggle button').forEach(b=>b.addEventListener('click', async ()=>{
    if(state.lang===b.dataset.lang) return;
    state.lang = b.dataset.lang;
    renderStaticText();
    renderAll();
    await persistLang();
  }));

  loadAll();
})();
</script>
</body>
</html>
